<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <title>AHFPF Framework Flow Diagram</title>
  <desc>A layered diagram showing the Five Pillars Framework. Communication (P5) crosses all pillars, with bi-directional feedback loops from Impact back to Entity.</desc>

  <style>
    .text-title { font-family: 'Newsreader', serif; font-size: 18px; font-weight: bold; fill: #1e293b; }
    .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #5a5a5a; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 4; }
    .box-p5 { fill: #fdf6e3; stroke: #f59e0b; stroke-width: 2; rx: 4; stroke-dasharray: 4; }
    .arrow { stroke: #cbd5e1; stroke-width: 2; fill: none; }
    .arrow-p5 { stroke: #f59e0b; stroke-width: 3; fill: none; }
    .arrow-head { fill: #cbd5e1; }
    .arrow-head-p5 { fill: #f59e0b; }
    .feedback { stroke: #10b981; stroke-width: 2; fill: none; stroke-dasharray: 6; }
    .feedback-head { fill: #10b981; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
    <marker id="arrowhead-p5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head-p5" />
    </marker>
    <marker id="arrowhead-feedback" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="feedback-head" />
    </marker>
  </defs>

  <!-- P5 Background Wrapper (Connective Layer) -->
  <rect class="box-p5" x="20" y="20" width="960" height="360" />
  <text x="500" y="50" text-anchor="middle" font-family="'Newsreader', serif" font-size="20" font-weight="bold" fill="#f59e0b">P5 — COMMUNICATION (The Infrastructural Bridge)</text>
  <text x="500" y="70" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#f59e0b">Enables Transmission, Coordination, and Feedback Across All Pillars</text>

  <!-- P1 Box -->
  <rect class="box" x="80" y="140" width="160" height="100" />
  <text x="160" y="180" text-anchor="middle" class="text-title">P1: Entity</text>
  <text x="160" y="205" text-anchor="middle" class="text-desc">The initiating actor</text>

  <!-- P2 Box -->
  <rect class="box" x="290" y="140" width="160" height="100" />
  <text x="370" y="180" text-anchor="middle" class="text-title">P2: Execution</text>
  <text x="370" y="205" text-anchor="middle" class="text-desc">Implementing body</text>

  <!-- P3 Box -->
  <rect class="box" x="500" y="140" width="160" height="100" />
  <text x="580" y="180" text-anchor="middle" class="text-title">P3: Initiative</text>
  <text x="580" y="205" text-anchor="middle" class="text-desc">The intervention</text>

  <!-- P4 Box -->
  <rect class="box" x="710" y="140" width="160" height="100" />
  <text x="790" y="180" text-anchor="middle" class="text-title">P4: Impact</text>
  <text x="790" y="205" text-anchor="middle" class="text-desc">Measurable change</text>

  <!-- Primary Flow Arrows (Bi-directional enabled by P5) -->
  <!-- P1 to P2 -->
  <line x1="240" y1="190" x2="280" y2="190" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="280" y1="210" x2="240" y2="210" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- P2 to P3 -->
  <line x1="450" y1="190" x2="490" y2="190" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="490" y1="210" x2="450" y2="210" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- P3 to P4 -->
  <line x1="660" y1="190" x2="700" y2="190" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="700" y1="210" x2="660" y2="210" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Macro Feedback Loop (Impact -> Entity) -->
  <path d="M 790 240 L 790 320 L 160 320 L 160 250" class="feedback" marker-end="url(#arrowhead-feedback)" />
  <text x="475" y="310" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#10b981" font-weight="bold">Systemic Feedback Loop (Adaptive Redesign)</text>

  <!-- P5 Vertical Connectors -->
  <line x1="160" y1="80" x2="160" y2="130" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="370" y1="80" x2="370" y2="130" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="580" y1="80" x2="580" y2="130" class="arrow-p5" marker-end="url(#arrowhead-p5)" />
  <line x1="790" y1="80" x2="790" y2="130" class="arrow-p5" marker-end="url(#arrowhead-p5)" />

</svg>
